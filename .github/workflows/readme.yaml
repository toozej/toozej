name: Update README

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  markscribe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Run markscribe
        run: docker run --rm -v "${{ github.workspace }}:/work" -w /work -e GITHUB_TOKEN="${{ secrets.PERSONAL_GITHUB_TOKEN }}" ghcr.io/charmbracelet/markscribe -write README.md templates/README.md.tpl
      - uses: stefanzweifel/git-auto-commit-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: 'Update generated README'
          branch: main
          commit_user_name: readme-scribe 🤖
          commit_user_email: actions@github.com
          commit_author: readme-scribe 🤖 <actions@github.com>

